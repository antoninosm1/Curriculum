<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>CV - Antonino Sánchez Martínez</title>
  <!-- Librería externa -->
  <script src="https://cloudflare.com"></script>
  <style>
    body { font-family: 'Segoe UI', sans-serif; background: #f0f0f0; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
    /* Contenedor que será el PDF */
    #mi-cv { width: 800px; background: white; box-shadow: 0 0 10px rgba(0,0,0,0.2); }
    header { background: #2c3e50; color: white; text-align: center; padding: 20px; }
    header img { width: 150px; border-radius: 5px; border: 3px solid white; }
    section { padding: 30px; }
    h2 { border-bottom: 2px solid #2c3e50; padding-bottom: 5px; }
    .btn-area { margin-bottom: 20px; }
    button { padding: 12px 24px; background: #2980b9; color: white; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
    button:hover { background: #1f6391; }
  </style>
</head>
<body>

  <div class="btn-area">
    <button onclick="generarPDF()">Descargar CV en PDF</button>
  </div>

  <!-- TODO lo que esté dentro de este DIV saldrá en el PDF -->
  <div id="mi-cv">
    <header>
      <img src="imgPersonal.jpg" alt="Foto Antonino" crossorigin="anonymous">
      <h1>Antonino Sánchez Martínez</h1>
      <p>Currículum Vitae</p>
    </header>

    <section>
      <h2>Datos Personales</h2>
      <p><strong>WhatsApp:</strong> 6566000784</p>
      <p><strong>Email:</strong> antoninosm1@gmail.com</p>
      
      <h2>Experiencia</h2>
      <p><strong>Banco del Bienestar (2024 - Actualidad)</strong><br>Auxiliar administrativo.</p>
      
      <h2>Formación</h2>
      <p>Ingeniería en Sistemas - ITCJ</p>
    </section>
  </div>

  <script>
    function generarPDF() {
      // 1. Seleccionamos el elemento por su ID correcto
      const elemento = document.getElementById('mi-cv'); 
      
      // 2. Configuramos el PDF
      const opciones = {
        margin: 0,
        filename: 'CV_Antonino_Sanchez.pdf',
        image: { type: 'jpeg', quality: 0.98 },
        html2canvas: { 
          scale: 2, 
          useCORS: true,
          logging: true // Para ver detalles en consola si falla
        },
        jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
      };

      // 3. Ejecutamos la conversión
      // Si "elemento" es null, aquí daría el error Unknown Source, 
      // pero ahora el ID coincide: "mi-cv"
      html2pdf().set(opciones).from(elemento).save()
        .catch(err => console.error("Error técnico:", err));
    }
  </script>
</body>
</html>
